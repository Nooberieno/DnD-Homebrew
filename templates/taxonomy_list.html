{% extends "base.html" %}

{% block content %}

<div class="content">
    <h1 class="title"> {{ taxonomy.name | capitalize }} </h1>

    {% if terms %}
        <div class="cards">
            {% for term in terms %}
            <a class="card-link" href="{{ term.permalink }}">
                <div class="card">
                    <div class="container">
                        <p style="text-align: center; word-wrap: break-word;">
                            {{ term.name }}
                        </p>
                        <div class="symbol">{{ term.pages | length }}</div>
                        <p style="text-align: center;">
                            pages
                        </p>
                    </div>
                </div>
            </a>
            {% endfor %}
        </div>
    {% endif %}
</div>

{% endblock content %}}
